server:
  http_addr: "127.0.0.1:3100"
  grpc_addr: "0.0.0.0:3101"
  grpc_advertise_addr: ""     # Agent 实际连接的地址，如 "192.168.1.100:3101"
  grpc_tls_addr: "0.0.0.0:3102"
  grpc_tls_cert: ""
  grpc_tls_key: ""
  psk_token: ""               # 必填！Agent 连接认证令牌

victoria_metrics:
  url: "http://127.0.0.1:8428"

sqlite:
  path: "./data/mantisops.db"

probe:
  interval: 30
  timeout: 5

websocket:
  ping_interval: 15

auth:
  username: ""                # 必填！Web 登录用户名
  password: ""                # 必填！Web 登录密码
  jwt_secret: ""              # 必填！建议 32+ 字符随机串

aliyun:
  enabled: false
  access_key_id: ""           # 或通过环境变量 ALIYUN_ACCESS_KEY_ID
  access_key_secret: ""       # 或通过环境变量 ALIYUN_ACCESS_KEY_SECRET
  interval: 60
  instances: []

encryption_key: ""            # 必填！64 位 hex 字符串，用于加密存储凭据
                              # 生成方式: openssl rand -hex 32

logging:
  dir: "./logs"
  level: "info"               # 最低记录级别: debug / info / warn / error
  buffer_size: 4096           # 异步写入队列缓冲大小
  retention:
    audit_days: 90            # 操作审计保留天数
    system_days: 30           # 系统日志保留天数
    agent_days: 7             # Agent 日志保留天数
  cleanup_hour: 3             # 每天几点执行清理（0-23）

network:
  enabled: false                    # 默认关闭，需手动开启
  monitor_interval: 60              # 连通性监控间隔（秒）
  snmp_interval: 300                # SNMP 采集间隔（秒）
  snmp_communities:                 # SNMP community 列表
    - "public"
    - "private"
  snmp_collect:
    concurrency: 3                  # SNMP 定时采集并发数（hard cap: 3）
    interval_ms: 100                # SNMP 定时采集请求间隔（minimum: 100ms）
  scan:
    icmp_concurrency: 10            # ICMP 并发数（hard cap: 10）
    icmp_interval_ms: 10            # ICMP 包间隔（minimum: 10ms）
    snmp_concurrency: 5             # SNMP 探测并发数（hard cap: 5）
    snmp_timeout_ms: 2000           # SNMP 超时（毫秒）
    icmp_timeout_ms: 1000           # ICMP 超时（毫秒）
    schedule: ""                    # 定时扫描 cron（如 "0 2 * * *"），空=不定时
    schedule_subnets: []            # 定时扫描目标网段
