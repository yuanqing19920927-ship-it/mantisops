services:
  opsboard-server:
    build:
      context: ..
      dockerfile: deployments/Dockerfile.server
    ports:
      - "127.0.0.1:3100:3100"
      - "0.0.0.0:3101:3101"
      - "0.0.0.0:3102:3102"
    volumes:
      - /opt/opsboard/data:/app/data
      - /opt/opsboard/configs:/app/configs
      - /opt/opsboard/certs:/app/certs
    depends_on:
      victoria-metrics:
        condition: service_healthy
    restart: always
    mem_limit: 192m

  victoria-metrics:
    image: victoriametrics/victoria-metrics:v1.106.1
    command:
      - "-retentionPeriod=7d"
      - "-storageDataPath=/data"
      - "-httpListenAddr=:8428"
    volumes:
      - /opt/opsboard/vm-data:/data
    ports:
      - "127.0.0.1:8428:8428"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8428/health"]
      interval: 5s
      timeout: 3s
      retries: 3
    restart: always
    mem_limit: 256m
