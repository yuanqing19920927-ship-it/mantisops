<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <rect width="48" height="48" rx="10" fill="#1a1f2e"/>
  <rect x="2" y="2" width="44" height="44" rx="8" fill="#212a3e" stroke="#2ca07a" stroke-width="1.5" stroke-opacity="0.3"/>
  <!-- Monitor frame -->
  <rect x="8" y="10" width="32" height="22" rx="3" fill="#2d3549" stroke="#2ca07a" stroke-width="1.5" stroke-opacity="0.5"/>
  <!-- Screen -->
  <rect x="10" y="12" width="28" height="18" rx="1.5" fill="#0f1520"/>
  <!-- Heartbeat line -->
  <polyline points="12,22 17,22 19,16 21,27 23,19 25,24 27,22 36,22" stroke="#2ca07a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Pulse glow -->
  <polyline points="12,22 17,22 19,16 21,27 23,19 25,24 27,22 36,22" stroke="#2ca07a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.3" filter="url(#glow)"/>
  <!-- Stand -->
  <path d="M20 34 L28 34 L26 38 L22 38 Z" fill="#2d3549"/>
  <rect x="18" y="38" width="12" height="2" rx="1" fill="#2d3549"/>
  <!-- Dot indicators -->
  <circle cx="15" cy="26" r="1.2" fill="#0ab39c" opacity="0.8"/>
  <circle cx="33" cy="18" r="1.2" fill="#f7b84b" opacity="0.8"/>
  <defs>
    <filter id="glow" x="-2" y="-2" width="44" height="34">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
</svg>
